services:
  server:
    build: .

    ports:
      - "8080:8080"

    env_file:
      - .env.development.local

    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  redis:
    image: redis:7.4-alpine

    ports:
      - "6379:6379"

    volumes:
      - redis-data:/data

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    profiles:
      - local-db

volumes:
  redis-data:
  mongo-data:
